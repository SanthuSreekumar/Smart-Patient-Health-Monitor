<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Patient Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
       
        body { 
            font-family: 'Roboto', 'Segoe UI', sans-serif; 
            background-color: #f8f9fa; 
            color: #202124; 
            text-align: center; 
            padding: 40px; 
            transition: background-color 0.3s, color 0.3s; 
            margin: 0;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        h1 { font-weight: 400; color: #1a73e8; margin-bottom: 5px;}
        p { color: #5f6368; font-size: 1.1rem; }

        .vitals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 30px; }
        
        .vital-card { 
            background: #ffffff; padding: 25px 20px; border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 1.1rem; color: #5f6368;
            transition: all 0.3s ease;
        }
        
        .value { font-size: 2.8rem; font-weight: 500; margin-top: 15px; color: #202124; }

        .status-bar { 
            margin-top: 30px; padding: 15px; border-radius: 12px; font-size: 1.4rem; 
            font-weight: 500; background: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); color: #188038;
        }

        /* Chart Layout */
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 30px; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /*  THE SNITCH ANIMATION LOGIC  */
        .alert-mode { background-color: #b31412 !important; }
        .alert-mode h1, .alert-mode p { color: white !important; }
        .alert-card { background: #d93025 !important; color: white !important; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
        .alert-card .value { color: white !important; font-weight: bold; }
        
        @keyframes strobe { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
        .flashing { animation: strobe 0.5s infinite; background: #ffffff !important; color: #d93025 !important; font-weight: bold; border: 4px solid #d93025; }
    </style>
</head>
<body id="bg">
    <div class="container">
        <h1>Live Patient Dashboard</h1>
        <p>Patient ID: <span id="patient_id">Waiting for sensor...</span> | Network: Cloud</p>

        <div class="vitals-grid">
            <div class="vital-card" id="card-hr">
                <div>Heart Rate</div>
                <div class="value" id="hr">--</div>
            </div>
            <div class="vital-card" id="card-spo2">
                <div>SpO2</div>
                <div class="value" id="spo2">--</div>
            </div>
            <div class="vital-card" id="card-temp">
                <div>Temp (°C)</div>
                <div class="value" id="temp">--</div>
            </div>
        </div>

        <div class="status-bar" id="status">Connecting to monitor...</div>

        <div class="charts-grid">
            <div class="chart-container">
                <canvas id="hrChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="spo2Chart"></canvas>
            </div>
        </div>
    </div>
    <script>
        // --- CHART SETUP ---
        const commonOptions = {
            responsive: true,
            animation: { duration: 0 }, // Turn off default animation for smooth scrolling
            scales: { x: { display: false } } // Hide X axis labels for a cleaner look
        };
        // Heart Rate Chart
        const hrCtx = document.getElementById('hrChart').getContext('2d');
        const hrChart = new Chart(hrCtx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Heart Rate (BPM)', data: [], borderColor: '#1a73e8', tension: 0.4, fill: false }] },
            options: { ...commonOptions, scales: { y: { min: 40, max: 180 } } }
        });
        // SpO2 Chart
        const spo2Ctx = document.getElementById('spo2Chart').getContext('2d');
        const spo2Chart = new Chart(spo2Ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Blood Oxygen (%)', data: [], borderColor: '#188038', tension: 0.4, fill: false }] },
            options: { ...commonOptions, scales: { y: { min: 80, max: 100 } } }
        });
        const MAX_DATA_POINTS = 15; // How many dots to show on the screen before scrolling
        // --- FETCH & UPDATE LOGIC ---
        function fetchVitals() {
            fetch('/api/data')
                .then(response => response.json())
                .then(data => {
                    if (data.hr === "--") return; // Don't chart empty data on boot
                    // 1. Update the Big Numbers
                    document.getElementById('patient_id').innerText = data.patient_id;
                    document.getElementById('hr').innerText = data.hr;
                    document.getElementById('spo2').innerText = data.spo2 + '%';
                    document.getElementById('temp').innerText = data.temp;
                    const statusEl = document.getElementById('status');
                    const bodyEl = document.getElementById('bg');
                    const cards = document.querySelectorAll('.vital-card');
                    statusEl.innerText = data.status;
                    // 2. Update the Charts
                    const timeNow = new Date().toLocaleTimeString();
                    // Add new data
                    hrChart.data.labels.push(timeNow);
                    hrChart.data.datasets[0].data.push(data.hr);
                    spo2Chart.data.labels.push(timeNow);
                    spo2Chart.data.datasets[0].data.push(data.spo2);
                    // Remove old data to create the scrolling effect
                    if (hrChart.data.labels.length > MAX_DATA_POINTS) {
                        hrChart.data.labels.shift();
                        hrChart.data.datasets[0].data.shift();
                        spo2Chart.data.labels.shift();
                        spo2Chart.data.datasets[0].data.shift();
                    }
                    // 3.  THE SNITCH TRIGGER 
                    if (data.is_alert) {
                        bodyEl.classList.add('alert-mode');
                        statusEl.classList.add('flashing');
                        cards.forEach(card => card.classList.add('alert-card'));
                        // Turn chart lines red during an alert!
                        hrChart.data.datasets[0].borderColor = '#ffffff';
                        spo2Chart.data.datasets[0].borderColor = '#ffffff';
                    } else {
                        bodyEl.classList.remove('alert-mode');
                        statusEl.classList.remove('flashing');
                        cards.forEach(card => card.classList.remove('alert-card'));
                        // Return to normal colors
                        hrChart.data.datasets[0].borderColor = '#1a73e8';
                        spo2Chart.data.datasets[0].borderColor = '#188038';
                    }
                    // Render the chart updates
                    hrChart.update();
                    spo2Chart.update();
                })
                .catch(err => console.log("Waiting for backend server..."));
        }
        // Poll the server every 2 seconds
        setInterval(fetchVitals, 2000);
    </script>
</body>
</html>
